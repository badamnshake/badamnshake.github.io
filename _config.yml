          A project made with microservice architecture (with api gateway and seperation of databases) in the backend. The project has two roles for users. Employers can create vacancies and Job seekers can apply to the posted jobs, I also leveraged stored procedures in SQL server. various features include authentication, RBAC and modern architecture.
