# About Section
#about_title: About Me
about_content: | # this will include new lines to allow paragraphs
  Hi, I am Kartavya Gohil, I am currently pursuing an Internship at Synoptek. I have made a few games in Unity. I have also wasted few weeks tinkering my linux distro.
  I have worked with .Net microservices, Angular in current internship, and also React and Nodejs (did some freelance projects).
  I am most skilled in: <mark>Nodejs</mark> , <mark>.Net</mark> and <mark>Unity</mark>

