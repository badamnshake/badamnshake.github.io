        quote: >
          React and Nestjs (Freelance)
        description: | # this will include new lines to allow paragraphs
          The exam system has two user types. A teacher can categorize questions by subject, chapter and can create an exam for a particular subject. A student can take the exam and can answer the questions. A student's performance and history is saved and can be viewed by the teacher. The performance report includes graphs and subject wise data. A test can be conducted by the teacher for the whole class and the results can be compared and are stored in the database for future analysis and assesment.
