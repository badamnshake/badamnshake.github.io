        title: Synoptek
        sub_title: Intern (Fullstack .Net and Microservices)
        caption: January 2022 - present
        description: | # this will include new lines to allow paragraphs
          I worked with .Net and Angular with microservices architecture and with SQL Databases. Learned about various design patterns in backend and clean architecture. Currently working in live project.
